<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文字列出力 | Pickleball Rally Analysis</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="export">
    <header>
      <h1>Pickleball Rally Analysis</h1>
      <p>AI に渡しやすい試合テキストを生成します。</p>
      <nav class="page-nav">
        <a href="./matches.html">試合一覧</a>
        <a href="./input.html">ポイント入力</a>
        <a href="./analysis.html">内容分析</a>
        <a href="./trajectories.html">ボール軌跡</a>
        <a class="active" href="./export.html">文字列出力</a>
      </nav>
    </header>

    <main class="single-layout">
      <section class="panel">
        <h2>分析用文字列出力</h2>
        <div id="detail-empty" class="muted">試合を選択すると表示されます</div>
        <div id="detail-content" class="hidden">
          <div class="stack">
            <button type="button" class="secondary-button" id="build-export-button">文字列を生成</button>
            <textarea id="analysis-export" rows="18" readonly placeholder="ここに AI に渡すための文字列を生成します"></textarea>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
